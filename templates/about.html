{% extends "index.html" %}

{%- import "macros/title.html" as title_macros -%}

{%- block title -%}
{{ title_macros::title(page_title=page.title, main_title=config.title) }}
{%- endblock -%}

{% block content %}
<div class="post">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-content">
        {{ page.content | safe }}
    </div>
</div>
{% endblock content %}
